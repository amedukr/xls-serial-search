name: Build macOS app

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install xlrd==1.2.0 openpyxl pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed --name "XLS_Serial_Search" xls_search_gui.py

      - name: Zip app
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/XLS_Serial_Search.app" "XLS_Serial_Search-mac.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XLS_Serial_Search-mac
          path: XLS_Serial_Search-mac.zip
